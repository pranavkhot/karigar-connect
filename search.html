<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
  <style>
    .filters{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .filters .full{grid-column:1 / -1;}
    .result{background:var(--surface);border:1px solid var(--line-soft);border-radius:18px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow-card);animation:rise .5s var(--ease) both;}
    .result h3{margin:0 0 3px;color:var(--ink);font-size:19px;font-weight:600;letter-spacing:-0.02em;}
    .result .meta{color:var(--muted);font-size:13px;margin-bottom:10px;}
    .tags{display:flex;flex-wrap:wrap;gap:7px;margin:10px 0;}
    .tag{background:rgba(0,113,227,.10);color:var(--accent);border-radius:999px;padding:5px 12px;font-size:13px;font-weight:600;}
    .kv{display:flex;gap:20px;flex-wrap:wrap;font-size:14px;margin:8px 0 2px;color:var(--muted);}
    .kv b{color:var(--ink);font-weight:600;}
    .actions{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;}
    .actions a{flex:1;min-width:118px;text-decoration:none;text-align:center;padding:13px;border-radius:12px;font-weight:600;font-size:15px;letter-spacing:-0.01em;transition:transform .18s var(--spring),opacity .2s;}
    .actions a:active{transform:scale(.97);}
    .a-call{background:var(--ink);color:#fff;}
    .a-wa{background:#34C759;color:#fff;}
    .a-cv{background:rgba(0,0,0,.05);color:var(--ink);}
    .statbar{background:var(--surface);border:1px solid var(--line-soft);border-radius:14px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;box-shadow:var(--shadow-card);}
    .statbar b{font-size:20px;letter-spacing:-0.02em;}
    label.flabel{font-size:13px;font-weight:600;color:var(--muted);display:block;margin-bottom:6px;}
    .lock-btn{width:auto;height:40px;padding:0 16px;border-radius:980px;font-size:14px;background:rgba(0,0,0,.05);color:var(--ink);border:none;font-weight:600;cursor:pointer;transition:transform .18s var(--spring);}
    .lock-btn:active{transform:scale(.95);}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="logo">KC</div>
    <div><h1 class="brand">Karigar Connect</h1><small>Candidate search</small></div>
  </div>

  <!-- Login -->
  <div id="login" class="wrap stagger" style="padding-top:36px;">
    <div class="page-title" style="font-size:28px;font-weight:700;letter-spacing:-0.03em;margin:8px 2px 18px;">Find candidates</div>
    <div class="card">
      <div class="field" style="margin-top:0;">
        <label>Enter password to view candidates</label>
        <input id="pw" type="password" onkeydown="if(event.key==='Enter')doLogin()">
        <div id="pwErr" class="err-text">Wrong password. Try again.</div>
      </div>
      <button class="btn btn-primary" onclick="doLogin()">Open search</button>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="wrap hidden" style="padding-top:18px;">
    <div class="statbar">
      <div><b id="totalCount">0</b> <span class="muted">candidates registered</span></div>
      <button class="lock-btn" onclick="logout()">Lock</button>
    </div>

    <div class="card">
      <div class="filters">
        <div class="full">
          <label class="flabel">Skill</label>
          <select id="fSkill"><option value="">Any skill</option></select>
        </div>
        <div class="full">
          <label class="flabel">Area / location</label>
          <input id="fArea" type="text" placeholder="e.g. Zaveri Bazaar">
        </div>
        <div>
          <label class="flabel">Min. experience (yrs)</label>
          <input id="fExp" type="number" inputmode="numeric" min="0" placeholder="0">
        </div>
        <div>
          <label class="flabel">Max. salary (₹/mo)</label>
          <input id="fSal" type="number" inputmode="numeric" min="0" placeholder="Any">
        </div>
        <div class="full">
          <label class="flabel">Availability</label>
          <select id="fAvail"><option value="">Any</option></select>
        </div>
      </div>
      <button class="btn btn-primary" style="margin-top:18px;" onclick="runSearch()">Search candidates</button>
    </div>

    <div id="results" style="margin-top:20px;"></div>
  </div>

<script>
var PW = '';
var SKILL_OPTS = ['Stone Setting','Polishing','Filing','Soldering','Casting','Wax Setting','Kundan','Meena (Enamel)','Chain Making','Designing / CAD','Repairing','Helper'];
var AVAIL_OPTS = ['Immediate','Within 15 days','Within 1 month','Currently working'];

(function init(){
  var s=document.getElementById('fSkill');
  SKILL_OPTS.forEach(function(o){var op=document.createElement('option');op.value=o;op.textContent=o;s.appendChild(op);});
  var a=document.getElementById('fAvail');
  AVAIL_OPTS.forEach(function(o){var op=document.createElement('option');op.value=o;op.textContent=o;a.appendChild(op);});
})();

function doLogin(){
  var pw = document.getElementById('pw').value;
  api('stats', {password:pw}).then(function(res){
    if(res && res.success){
      PW = pw;
      document.getElementById('login').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      document.getElementById('totalCount').textContent = res.total;
      runSearch();
    } else {
      document.getElementById('pwErr').style.display='block';
    }
  }).catch(function(){ document.getElementById('pwErr').style.display='block'; });
}
function logout(){ PW=''; document.getElementById('app').classList.add('hidden'); document.getElementById('login').classList.remove('hidden'); document.getElementById('pw').value=''; }

function runSearch(){
  var results = document.getElementById('results');
  results.innerHTML = '<div class="center muted" style="padding:30px;"><span class="spin" style="border-color:rgba(0,113,227,.25);border-top-color:var(--accent);"></span> Searching…</div>';
  var filters = {
    password: PW,
    skill: document.getElementById('fSkill').value,
    area: document.getElementById('fArea').value,
    minExperience: document.getElementById('fExp').value || '',
    maxSalary: document.getElementById('fSal').value || '',
    availability: document.getElementById('fAvail').value
  };
  api('search', {filters:filters}).then(render).catch(function(){
    results.innerHTML='<div class="center muted" style="padding:30px;">Something went wrong. Try again.</div>';
  });
}

function inr(n){ n=Number(n)||0; return n? n.toLocaleString('en-IN') : '—'; }

function render(res){
  var results = document.getElementById('results');
  if(!res || !res.success){ results.innerHTML='<div class="center muted" style="padding:30px;">Session expired. Please unlock again.</div>'; return; }
  if(!res.candidates.length){ results.innerHTML='<div class="center muted" style="padding:36px;">No candidates match these filters yet. Try widening the search.</div>'; return; }

  var html = '<div class="muted" style="margin-bottom:12px;font-size:14px;">'+res.total+' result'+(res.total===1?'':'s')+'</div>';
  res.candidates.forEach(function(c){
    var tags = String(c.skills||'').split(',').map(function(s){return s.trim();}).filter(Boolean)
      .map(function(s){return '<span class="tag">'+esc(s)+'</span>';}).join('');
    var wa = String(c.mobile).length===10 ? '91'+c.mobile : c.mobile;
    html += '<div class="result">'
      + '<h3>'+esc(c.name)+'</h3>'
      + '<div class="meta">'+esc(c.area||'—')+'  •  ID '+esc(c.id)+'</div>'
      + '<div class="tags">'+tags+'</div>'
      + '<div class="kv"><span><b>'+(c.experience||0)+'</b> yrs exp</span>'
      + '<span>Expected: <b>₹ '+inr(c.salary)+'</b>/mo</span>'
      + '<span>Joins: <b>'+esc(c.availability||'—')+'</b></span></div>'
      + '<div class="actions">'
      + '<a class="a-call" href="tel:'+esc(c.mobile)+'">📞 Call</a>'
      + '<a class="a-wa" href="https://wa.me/'+esc(wa)+'" target="_blank">WhatsApp</a>'
      + (c.cvUrl?'<a class="a-cv" href="'+esc(c.cvUrl)+'" target="_blank">View CV</a>':'')
      + (c.resumeUrl?'<a class="a-cv" href="'+esc(c.resumeUrl)+'" target="_blank">Original</a>':'')
      + '</div></div>';
  });
  results.innerHTML = html;
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m];}); }
</script>
</body>
</html>
